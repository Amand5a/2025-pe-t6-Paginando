name: DevSecOps Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call DevSecOps Agent
        shell: bash
        run: |
          RESPONSE=$(curl -sS -X POST "https://amand182a.app.n8n.cloud/webhook/devsecops-agent" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${{ github.event_name }}" \
            --data-binary "@${{ github.event_path }}")

          echo "Raw response from n8n:"
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | jq -r '.decision // "NO_DECISION"')

          echo "Parsed decision: $DECISION"

          if [ "$DECISION" = "BLOCK" ]; then
            echo "Deploy blocked by DevSecOps Agent"
            exit 1
          fi

          echo "Deploy approved by DevSecOps Agent"
