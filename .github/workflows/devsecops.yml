name: DevSecOps Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call DevSecOps Agent
        id: agent
        run: |
          RESPONSE=$(curl -s -X POST "https://SEU-WEBHOOK-N8N" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}"
            }')

          echo "$RESPONSE"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Block deploy if critical risk
        run: |
          DECISION='${{ fromJson(steps.agent.outputs.response).decision }}'

          if [ "$DECISION" = "BLOCK" ]; then
            echo "Deploy blocked by DevSecOps Agent"
            exit 1
          fi

          echo "Deploy approved by DevSecOps Agent"
