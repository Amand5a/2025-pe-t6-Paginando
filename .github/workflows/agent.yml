name: DevSecOps Agent Gate

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main

jobs:
  devsecops-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send event to n8n DevSecOps Agent
        id: agent
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${{ github.event_name }}" \
            -d @${{ github.event_path }})

          echo "Agent response:"
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | jq -r '.decision // "NO_DECISION"')
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

          if [ "$DECISION" = "BLOCK" ]; then
            echo "Deploy blocked by DevSecOps Agent"
            exit 1
          fi

          echo "Deploy approved by DevSecOps Agent"
